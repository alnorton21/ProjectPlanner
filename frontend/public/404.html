<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Project Planner</title>
    <script>
      // GitHub Pages SPA redirect — encodes the path into the query string
      // so index.html can decode it and restore the route via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
